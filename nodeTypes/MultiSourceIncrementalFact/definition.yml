capitalized: MultiSource Incremental Fact
short: MSINCFCT
tagColor: '#FF69B4'
plural: MultiSource Incremental Facts

config:
  
- groupName: Incremental Options
  items:
  - type: materializationSelector
    isRequired: true
    options:
    - table

  - type: multisourceToggle
    enableIf: "{% if node.override.create.enabled %} false {% else %} true {% endif %}"
  - displayName: Multi Source Strategy
    attributeName: insertStrategy
    type: dropdownSelector
    default: UNION ALL
    options:
    - "UNION"
    - "UNION ALL"
    isRequired: false
    enableIf: "{% if node.isMultisource %} true {% else %} false {% endif %}"

  - displayName: Enable Incremental Loading
    attributeName: enableIncremental
    type: toggleButton
    default: true

  - displayName: Load Date Column
    attributeName: loadDateColumn
    type: columnDropdownSelector
    isRequired: true
    enableIf: "{% if config.enableIncremental %} true {% else %} false {% endif %}"

  - type: businessKeyColumns
    isRequired: false

  - displayName: Enable Soft Delete Handling
    attributeName: enableSoftDelete
    type: toggleButton
    default: false

  - displayName: Soft Delete Column
    attributeName: softDeleteColumn
    type: columnDropdownSelector
    isRequired: true
    enableIf: "{% if config.enableSoftDelete %} true {% else %} false {% endif %}"

  - displayName: Enable Tests
    attributeName: testsEnabled
    type: toggleButton
    default: false

  - displayName: Pre-SQL
    attributeName: preSQL
    type: textBox
    syntax: sql
    isRequired: false

  - displayName: Post-SQL
    attributeName: postSQL
    type: textBox
    syntax: sql
    isRequired: false

systemColumns:
- displayName: LOAD_TIMESTAMP
  transform: CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
  dataType: TIMESTAMP
  placement: end
  attributeName: isSystemLoadTimestamp
